<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>店小乖 - 机器人平板</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              warm:    { 50: '#fefcf9', 100: '#fdf7ef', 200: '#f5ede0', 300: '#ece1cf', 400: '#d4c8b0', 500: '#b0a48a' },
              brand:   { DEFAULT: '#FD7126', light: '#FFAB7A', dark: '#C75200', glow: 'rgba(253,113,38,0.15)' },
              mint:    { DEFAULT: '#3AB795', light: '#6EDCBA', dark: '#248F73', glow: 'rgba(58,183,149,0.12)' },
              amber:   { DEFAULT: '#E8973E', light: '#F5BE6A', dark: '#B46E1A' },
            },
            fontFamily: {
              display: ['"Plus Jakarta Sans"', '"Noto Sans SC"', 'system-ui'],
              body:    ['"Noto Sans SC"', '"Plus Jakarta Sans"', 'system-ui'],
            },
          }
        }
      }
    </script>
    <style>
      * { box-sizing: border-box; }
      html, body, #root { height: 100%; margin: 0; overflow: hidden; background: #fefcf9; }
      body { font-family: 'Noto Sans SC', 'Plus Jakarta Sans', system-ui; -webkit-font-smoothing: antialiased; }
      .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 500, 'GRAD' 0, 'opsz' 24; }
      .icon-fill { font-variation-settings: 'FILL' 1, 'wght' 500; }

      /* Tablet viewport frame */
      .tablet-viewport {
        width: 100%; height: 100%;
        position: relative;
        overflow: hidden;
      }

      /* Scrollable inner */
      .tablet-scroll {
        height: 100%; overflow-y: auto; overflow-x: hidden;
        scroll-behavior: smooth;
      }
      .tablet-scroll::-webkit-scrollbar { width: 3px; }
      .tablet-scroll::-webkit-scrollbar-track { background: transparent; }
      .tablet-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }

      /* Gradients */
      .grad-brand  { background: linear-gradient(135deg, #C75200 0%, #FD7126 40%, #FFAB7A 100%); }
      .grad-mint   { background: linear-gradient(135deg, #248F73 0%, #3AB795 40%, #6EDCBA 100%); }
      .grad-amber  { background: linear-gradient(135deg, #B46E1A 0%, #E8973E 40%, #F5BE6A 100%); }
      .grad-hero   { background: linear-gradient(180deg, rgba(26,24,20,0) 0%, rgba(26,24,20,0.7) 100%); }

      /* Shimmer animation */
      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }
      .shimmer {
        background: linear-gradient(90deg, transparent 30%, rgba(255,255,255,0.08) 50%, transparent 70%);
        background-size: 200% 100%;
        animation: shimmer 3s ease-in-out infinite;
      }

      /* Pulse glow for CTA */
      @keyframes pulse-glow {
        0%, 100% { box-shadow: 0 0 0 0 rgba(253,113,38,0.4); }
        50% { box-shadow: 0 0 0 12px rgba(253,113,38,0); }
      }
      .cta-pulse { animation: pulse-glow 2.5s ease-in-out infinite; }

      /* Floating animation */
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-6px); }
      }
      .float { animation: float 4s ease-in-out infinite; }

      /* Number counter animation */
      @keyframes count-up {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .count-enter { animation: count-up 0.4s ease-out; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
